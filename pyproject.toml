[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "minic"
version = "0.1.0"
description = "Single-operator Codex and Telegram terminal bridge"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
minic = "minic.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
